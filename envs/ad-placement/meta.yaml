name: ad-placement
type: coding
description: AtCoder 广告投放优化题批量评测环境。被测模型提交 C++17 代码，scorer 编译后在固定评测用例上运行并计分。
pass_threshold: 1

# 运行前置（见 docs/env-prerequisites.md）
prerequisites:
  level: compiler                      # none | skill-source | office | compiler | media | judge
  summary: "需 g++（编译 C++17 提交）+ 打包的 tester 二进制。tester 是 x86-64 Linux ELF，macOS 原生跑不了 → 需 Linux 容器。50 用例自带。"
  requires:
    - "g++ / clang (C++17)"
    - "Linux 运行环境（tester 为 x86-64 ELF）"
  on_missing: "tester 调用失败 / 编译不了 → batch_score 为 0"


entrypoints:
  mcp:
    enabled: true
    transport: stdio
    command: ["uv", "run", "--project", ".", "python", "envs/ad-placement/mcp_server.py"]

dimensions:
  - name: batch_score
    weight: 100
    description: 基于 50 个固定评测用例原始总分归一化得到的 0-100 优化分。
